name: Daily Scrapper Update PR

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC (GMT+0)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: packages/scrapper/yarn.lock

      - name: Install scraper dependencies
        working-directory: packages/scrapper
        run: corepack yarn install --immutable

      - name: Run scraper
        working-directory: packages/scrapper
        run: yarn start

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain -- packages/site/content)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify content changes
        id: classify_changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          only_plugins=true
          has_content_yml=false

          mapfile -t changed_files < <(git diff --name-only -- packages/site/content)

          for file in "${changed_files[@]}"; do
            case "$file" in
              packages/site/content/plugins/*)
                ;;
              packages/site/content/*.yml)
                has_content_yml=true
                only_plugins=false
                ;;
              *)
                only_plugins=false
                ;;
            esac
          done

          echo "only_plugins=$only_plugins" >> "$GITHUB_OUTPUT"
          echo "has_content_yml=$has_content_yml" >> "$GITHUB_OUTPUT"
          echo "only_plugins=$only_plugins, has_content_yml=$has_content_yml"

      - name: Commit plugin files directly to main
        id: direct_push
        if: steps.check_changes.outputs.changed == 'true' && steps.classify_changes.outputs.only_plugins == 'true'
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_TOKEN:-}" ]]; then
            echo "GitHub App token is not available"
            exit 1
          fi

          git config user.name "gorgo-bot"
          git config user.email "gorgo-bot@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"

          git add packages/site/content/plugins

          if git diff --cached --quiet; then
            echo "No staged changes for direct commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: daily plugin content update"
          git pull origin main --rebase
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy workflow via API
        if: steps.direct_push.outputs.pushed == 'true'
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          curl -sS -X POST \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/hello.yml/dispatches" \
            -d '{"ref":"main"}'

          echo "Dispatched workflow hello.yml on main"

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true' && steps.classify_changes.outputs.has_content_yml == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: 'chore: daily scraped content update'
          title: 'chore: daily scraped content update'
          body: |
            Automated daily update generated by the scraper workflow.

            - Schedule: 06:00 UTC
            - Command: `yarn start` in `packages/scrapper`
            - Included changes: `packages/site/content`
          branch: chore/daily-scrapper-content-update
          delete-branch: true
          add-paths: |
            packages/site/content
          labels: automation

      - name: No action for current diff
        if: steps.check_changes.outputs.changed == 'true' && steps.classify_changes.outputs.only_plugins != 'true' && steps.classify_changes.outputs.has_content_yml != 'true'
        run: |
          echo "Changes detected, but they don't match routing rules. No commit/PR action taken."