name: Daily Scrapper Update PR

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC (GMT+0)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack and set Yarn version
        run: |
          npm install -g corepack
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          which yarn
          yarn --version
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: packages/scrapper/yarn.lock

      - name: Install scraper dependencies
        working-directory: packages/scrapper
        run: corepack yarn install --immutable

      - name: Run scraper
        working-directory: packages/scrapper
        run: yarn start

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain -- packages/site/content)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(plugins): Update plugin metadata from NPM'
          title: 'chore(content): daily scraped content update'
          body: |
            Automated daily update generated by the scraper workflow.

            - Schedule: 06:00 UTC
            - Command: `yarn start` in `packages/scrapper`
            - Included changes: `packages/site/content`
          branch: chore/daily-scrapper-content-update
          delete-branch: true
          add-paths: |
            packages/site/content