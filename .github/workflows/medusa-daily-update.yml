name: Daily Medusa Version Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      medusa_version:
        description: "Optional Medusa version override"
        required: false
        type: string

jobs:
  check_medusa_version:
    name: Check Medusa version increment
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.versions.outputs.should_update }}
      new_medusa_version: ${{ steps.versions.outputs.new_medusa_version }}
      current_versions: ${{ steps.versions.outputs.current_versions }}
      outdated_examples: ${{ steps.versions.outputs.outdated_examples }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve version delta
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.medusa_version || '' }}" ]; then
            TARGET_VERSION="${{ github.event.inputs.medusa_version }}"
          else
            TARGET_VERSION="$(npm view @medusajs/medusa version)"
          fi

          ANALYSIS="$(node - "$TARGET_VERSION" <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const target = process.argv[2]
          const examplesDir = path.join(process.cwd(), 'examples')
          const versions = new Set()
          const outdated = []

          for (const entry of fs.readdirSync(examplesDir, { withFileTypes: true })) {
            if (!entry.isDirectory()) continue

            const pkgPath = path.join(examplesDir, entry.name, 'medusa', 'package.json')
            if (!fs.existsSync(pkgPath)) continue

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            const version = pkg.dependencies && pkg.dependencies['@medusajs/medusa']
            const normalized = version ? version.replace(/^[~^]/, '') : null

            if (normalized) {
              versions.add(normalized)
            }

            if (!normalized || normalized !== target) {
              outdated.push(entry.name)
            }
          }

          const sorted = [...versions].sort((a, b) => {
            const pa = a.split('.').map((n) => Number(n))
            const pb = b.split('.').map((n) => Number(n))
            for (let i = 0; i < 3; i++) {
              if ((pa[i] || 0) !== (pb[i] || 0)) return (pa[i] || 0) - (pb[i] || 0)
            }
            return 0
          })

          const currentVersions = sorted.join(',')
          const outdatedExamples = outdated.join(',')
          const shouldUpdate = outdated.length > 0 ? 'true' : 'false'

          process.stdout.write(`CURRENT_VERSIONS=${currentVersions}\n`)
          process.stdout.write(`OUTDATED_EXAMPLES=${outdatedExamples}\n`)
          process.stdout.write(`SHOULD_UPDATE=${shouldUpdate}\n`)
          NODE
          )"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            eval "$line"
          done <<< "$ANALYSIS"

          echo "new_medusa_version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_versions=$CURRENT_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "should_update=$SHOULD_UPDATE" >> "$GITHUB_OUTPUT"
          echo "outdated_examples=$OUTDATED_EXAMPLES" >> "$GITHUB_OUTPUT"

          echo "Current versions: $CURRENT_VERSIONS"
          echo "Target version: $TARGET_VERSION"
          echo "Should update: $SHOULD_UPDATE"
          echo "Outdated examples: $OUTDATED_EXAMPLES"

  update_test_and_pr:
    name: Update Medusa, run tests, create PR
    needs: check_medusa_version
    if: needs.check_medusa_version.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      YARN_ENABLE_GLOBAL_CACHE: "false"
      YARN_CACHE_FOLDER: .yarn/cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack and Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install root dependencies
        run: corepack yarn install --immutable

      - name: Prepare Postgres databases and .env files for examples
        shell: bash
        run: |
          set -euo pipefail

          OUTDATED_EXAMPLES="${{ needs.check_medusa_version.outputs.outdated_examples }}"
          if [ -z "$OUTDATED_EXAMPLES" ]; then
            echo "No outdated examples list returned; skipping env/db preparation."
            exit 0
          fi

          IFS=',' read -ra EXAMPLES <<< "$OUTDATED_EXAMPLES"
          for example in "${EXAMPLES[@]}"; do
            [ -z "$example" ] && continue

            medusa_dir="examples/${example}/medusa"
            template="${medusa_dir}/.env.template"

            if [ ! -d "${medusa_dir}" ]; then
              echo "Directory ${medusa_dir} not found, skipping"
              continue
            fi

            db_name=""
            if [ -f "$template" ]; then
              db_name="$(grep -E '^DB_NAME=' "$template" | head -n 1 | cut -d= -f2-)"
            elif [ -f "${medusa_dir}/.env.test" ]; then
              db_name="$(grep -E '^DB_NAME=' "${medusa_dir}/.env.test" | head -n 1 | cut -d= -f2-)"
            fi

            if [ -z "$db_name" ]; then
              db_name="medusa_ci"
            fi

            exists=$(psql "postgresql://postgres:postgres@localhost:5432/postgres" -tAc "SELECT 1 FROM pg_database WHERE datname='${db_name}'")
            if [ "$exists" != "1" ]; then
              psql "postgresql://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE \"${db_name}\";"
            fi

            # Generate .env for development/migrations
            cat > "${medusa_dir}/.env" <<EOF
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/${db_name}
          STORE_CORS=http://localhost:8000
          ADMIN_CORS=http://localhost:7000
          AUTH_CORS=http://localhost:7000
          JWT_SECRET=supersecret
          COOKIE_SECRET=supersecret
          EOF

            # Generate .env.test for integration tests (NODE_ENV=test)
            # Prefer committed .env.test values; fall back to template if missing.
            if [ -f "${medusa_dir}/.env.test" ]; then
              echo "Using committed .env.test for ${medusa_dir}"
            elif [ -f "$template" ]; then
              cat "$template" > "${medusa_dir}/.env.test"
            else
              echo "No .env.test or .env.template found for ${medusa_dir}, skipping"
              continue
            fi

            # Normalize DB fields for CI postgres service.
            sed -i "s|\$DB_NAME|${db_name}|g" "${medusa_dir}/.env.test"
            sed -i 's|postgres://postgres@localhost/|postgres://postgres:postgres@localhost/|g' "${medusa_dir}/.env.test"
            grep -q "^DB_USERNAME=" "${medusa_dir}/.env.test" || echo "DB_USERNAME=postgres" >> "${medusa_dir}/.env.test"
            grep -q "^DB_PASSWORD=" "${medusa_dir}/.env.test" || echo "DB_PASSWORD=postgres" >> "${medusa_dir}/.env.test"
            grep -q "^DB_NAME=" "${medusa_dir}/.env.test" || echo "DB_NAME=${db_name}" >> "${medusa_dir}/.env.test"
            sed -i 's/^DB_USERNAME=$/DB_USERNAME=postgres/' "${medusa_dir}/.env.test"
            sed -i 's/^DB_PASSWORD=$/DB_PASSWORD=postgres/' "${medusa_dir}/.env.test"
          done

      - name: Run update script only for outdated examples
        shell: bash
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: "5432"
        run: |
          set -euo pipefail
          chmod +x ./scripts/update.sh

          TARGET_VERSION="${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          OUTDATED_EXAMPLES="${{ needs.check_medusa_version.outputs.outdated_examples }}"

          IFS=',' read -ra EXAMPLES <<< "$OUTDATED_EXAMPLES"
          for example in "${EXAMPLES[@]}"; do
            [ -z "$example" ] && continue
            echo "Updating example: $example"
            ./scripts/update.sh "$TARGET_VERSION" "$example" --single
          done

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Medusa to v${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          title: "chore: update Medusa to v${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          body: |
            Automated daily Medusa update.

            - Previous Medusa versions in repo: ${{ needs.check_medusa_version.outputs.current_versions }}
            - Updated to: ${{ needs.check_medusa_version.outputs.new_medusa_version }}
            - Updated examples only: ${{ needs.check_medusa_version.outputs.outdated_examples }}
            - Steps executed:
              - Postgres DB preparation for examples
              - `./scripts/update.sh <version> <example> --single` for outdated examples only
              - Build + integration tests only for outdated examples
          branch: chore/medusa-update-v${{ needs.check_medusa_version.outputs.new_medusa_version }}
          delete-branch: true
          labels: |
            dependencies
            automation

      - name: Show pull request result
        if: always()
        run: |
          echo "PR number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR URL: ${{ steps.cpr.outputs.pull-request-url }}"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`
            const version = `${{ needs.check_medusa_version.outputs.new_medusa_version }}` || 'unknown'

            const title = `[CI] Medusa auto-update failed (target ${version})`
            const body = [
              '',
              'Automatic daily Medusa update workflow failed.',
              '',
              `- Repository: ${owner}/${repo}`,
              `- Run URL: ${runUrl}`,
              `- Target Medusa version: ${version}`,
              '',
              'Please check the failed job logs for details.'
            ].join('\n')

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['ci', 'automation', 'needs-attention']
            })

  no_update_needed:
    name: No update needed
    needs: check_medusa_version
    if: needs.check_medusa_version.outputs.should_update != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip reason
        run: |
          echo "No Medusa update needed."
          echo "Current versions: ${{ needs.check_medusa_version.outputs.current_versions }}"
          echo "Latest version: ${{ needs.check_medusa_version.outputs.new_medusa_version }}"
