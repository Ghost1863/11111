name: Release Plugins

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changed-packages:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_changes: ${{ steps.collect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: collect
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED="$(git diff --name-only "$BEFORE" "$GITHUB_SHA" || true)"
          PKGS="$(echo "$CHANGED" | awk -F/ '/^packages\/[^/]+\// {print $2}' | sort -u)"

          #test------------------------------------------------------------------------------------------------------------
          #PKGS="$(find packages -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -u)"
          PKGS=medusa-feed-yandex
          #test------------------------------------------------------------------------------------------------------------

          if [ -z "$PKGS" ]; then
            echo 'matrix={"package":[]}' >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON="$(printf '%s\n' "$PKGS" | jq -R -s -c 'split("\n")[:-1] | {package: .}')"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  test-and-build:
    name: Test & build changed packages
    needs: changed-packages
    if: needs.changed-packages.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changed-packages.outputs.matrix) }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medusa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d medusa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/medusa_test
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/medusa_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install deps
        run: yarn install --immutable

      - name: Build package
        run: yarn workspace @gorgo/${{ matrix.package }} build

      - name: Run tests if script exists
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR="packages/${{ matrix.package }}"
          HAS_TEST=$(jq -r '.scripts.test // empty' "$PKG_DIR/package.json" | wc -c)
          if [ "$HAS_TEST" -gt 0 ]; then
            echo "Running tests for $PKG_DIR"
            yarn workspace @gorgo/${{ matrix.package }} test
          else
            echo "No test script in $PKG_DIR/package.json, skipping tests."
          fi

  release:
    name: Release to npm
    needs: [changed-packages, test-and-build]
    if: always() && needs.changed-packages.outputs.has_changes == 'true' && needs.test-and-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: yarn install 

      - name: Create npmrc
        run: |
          cat <<EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release with Changesets
        uses: changesets/action@v1
        with:
          publish: yarn changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}