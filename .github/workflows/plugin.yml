name: Update Medusa Version

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check_medusa_version:
    name: Check Medusa version increment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_update: ${{ steps.versions.outputs.should_update }}
      new_medusa_version: ${{ steps.versions.outputs.new_medusa_version }}
      current_versions: ${{ steps.versions.outputs.current_versions }}
      outdated_packages: ${{ steps.versions.outputs.outdated_packages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve version delta
        id: versions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_OWNER: ${{ github.repository_owner }}
          TARGET_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          TARGET_VERSION="$(npm view @medusajs/medusa version)"

          export TARGET_VERSION

          node - <<'NODE'
          const fs = require('fs')
          const path = require('path')
          const https = require('https')

          const MEDUSA_SCOPE = '@medusajs/'
          const DEP_SECTIONS = ['dependencies', 'devDependencies', 'peerDependencies']

          const target = process.env.TARGET_VERSION
          const packagesDir = path.join(process.cwd(), 'packages')
          const versions = new Set()
          const outdated = []

          /**
           * Compare two semver strings: returns -1, 0, or 1.
           */
          function compareSemver(a, b) {
            const pa = a.split('.').map(Number)
            const pb = b.split('.').map(Number)
            for (let i = 0; i < 3; i++) {
              if ((pa[i] || 0) < (pb[i] || 0)) return -1
              if ((pa[i] || 0) > (pb[i] || 0)) return 1
            }
            return 0
          }

          /**
           * Strip semver range prefix (^, ~, >=, etc.) to get a bare version.
           */
          function stripRange(version) {
            return version ? version.replace(/^[~^>=<]+/, '') : null
          }

          for (const entry of fs.readdirSync(packagesDir, { withFileTypes: true })) {
            if (!entry.isDirectory()) continue

            const pkgPath = path.join(packagesDir, entry.name, 'package.json')
            if (!fs.existsSync(pkgPath)) continue

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            let isOutdated = false

            for (const section of DEP_SECTIONS) {
              const deps = pkg[section]
              if (!deps) continue

              for (const [name, range] of Object.entries(deps)) {
                if (!name.startsWith(MEDUSA_SCOPE)) continue

                const bare = stripRange(range)
                if (!bare) continue

                versions.add(bare)

                if (compareSemver(bare, target) < 0) {
                  isOutdated = true
                }
              }
            }

            if (isOutdated) {
              outdated.push(entry.name)
            }
          }

          const sorted = [...versions].sort(compareSemver)

          const currentVersions = sorted.join(',')
          const outdatedPackages = outdated.join(',')

          const owner = process.env.TARGET_OWNER
          const repo = process.env.TARGET_REPO
          const branchName = `chore/medusa-update-v${target}`

          function hasOpenPrForBranch() {
            return new Promise((resolve) => {
              const apiToken = process.env.GITHUB_TOKEN
              if (!owner || !repo || !apiToken) {
                resolve(false)
                return
              }

              const head = encodeURIComponent(`${owner}:${branchName}`)
              const options = {
                hostname: 'api.github.com',
                path: `/repos/${owner}/${repo}/pulls?state=open&head=${head}`,
                method: 'GET',
                headers: {
                  'User-Agent': 'medusa-daily-version-update',
                  'Authorization': `Bearer ${apiToken}`,
                  'Accept': 'application/vnd.github+json',
                },
              }

              const req = https.request(options, (res) => {
                let body = ''
                res.on('data', (chunk) => {
                  body += chunk
                })
                res.on('end', () => {
                  try {
                    if (res.statusCode !== 200) {
                      console.log(`PR lookup skipped: GitHub API status ${res.statusCode}, body: ${body}`)
                      resolve(false)
                      return
                    }

                    const prs = JSON.parse(body)
                    resolve(Array.isArray(prs) && prs.length > 0)
                  } catch {
                    resolve(false)
                  }
                })
              })

              req.on('error', () => resolve(false))
              req.end()
            })
          }

          ;(async () => {
            const openPrExists = await hasOpenPrForBranch()
            const shouldUpdate = outdated.length > 0 && !openPrExists ? 'true' : 'false'

            const outPath = process.env.GITHUB_OUTPUT
            fs.appendFileSync(outPath, `new_medusa_version=${target}\n`)
            fs.appendFileSync(outPath, `current_versions=${currentVersions}\n`)
            fs.appendFileSync(outPath, `should_update=${shouldUpdate}\n`)
            fs.appendFileSync(outPath, `outdated_packages=${outdatedPackages}\n`)

            console.log(`Current versions: ${currentVersions}`)
            console.log(`Target version: ${target}`)
            console.log(`Outdated packages: ${outdatedPackages}`)
            console.log(`Open PR for ${branchName}: ${openPrExists}`)
            console.log(`Should update: ${shouldUpdate}`)
          })()
          NODE

  update_test_and_pr:
    name: Update Medusa, run tests, create PR
    needs: check_medusa_version
    if: needs.check_medusa_version.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      YARN_ENABLE_GLOBAL_CACHE: "false"
      YARN_CACHE_FOLDER: .yarn/cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack and Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install root dependencies
        run: corepack yarn install --immutable

      - name: Run update script only for outdated packages
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/update.sh

          TARGET_VERSION="${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          OUTDATED_PACKAGES="${{ needs.check_medusa_version.outputs.outdated_packages }}"

          IFS=',' read -ra PACKAGES <<< "$OUTDATED_PACKAGES"
          for pkg in "${PACKAGES[@]}"; do
            [ -z "$pkg" ] && continue
            echo "Updating package: $pkg"
            ./scripts/update.sh "$TARGET_VERSION" "$pkg" --single --skip-build
          done

      - name: Generate GitHub App token for PR
        id: app-token-pr
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token-pr.outputs.token }}
          commit-message: "chore: update Medusa to v${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          title: "chore: update Medusa to v${{ needs.check_medusa_version.outputs.new_medusa_version }}"
          body: |
            Automated daily Medusa update.

            - Previous Medusa versions in repo: ${{ needs.check_medusa_version.outputs.current_versions }}
            - Updated to: ${{ needs.check_medusa_version.outputs.new_medusa_version }}
            - Updated packages: ${{ needs.check_medusa_version.outputs.outdated_packages }}
          branch: chore/medusa-update-v${{ needs.check_medusa_version.outputs.new_medusa_version }}
          delete-branch: true
          labels: |
            dependencies
            automation

      - name: Show pull request result
        if: always()
        run: |
          echo "PR number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR URL: ${{ steps.cpr.outputs.pull-request-url }}"

