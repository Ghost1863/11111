name: NPM Plugin Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install npm-registry-fetch js-yaml

      - name: Run scraper
        run: node scraper.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat(plugins): Update plugin metadata from NPM'
          title: 'Update Plugins from NPM'
          body: |
            This PR was auto-generated by the NPM plugin scraper.
            It contains updates to the plugin metadata and READMEs based on the latest versions found on NPM.
          branch: 'chore/update-npm-plugins'
          delete-branch: true
